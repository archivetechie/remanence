<svg xmlns="http://www.w3.org/2000/svg" width="640" height="176" viewBox="0 0 640 176" role="img" aria-label="Local round trip: rem archive build turns src/ into demo.rao, rem archive extract restores it, and diff -r confirms the copies are byte-identical; rem archive inspect reads the object in place">
  <rect width="100%" height="100%" fill="#fcfcfc"/>
  <style>
    .rs { fill: #fff8f0; stroke: #a45200; }
    .gs { fill: #fcfcfc; stroke: #17191b; }
    .rt { font: 11px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #17191b; }
    .rtd { font: 10px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #9a9a9a; }
    .rtg { font: 9px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #9a9a9a; letter-spacing: .18em; }
    .rl { stroke: #9a9a9a; stroke-width: 1; fill: none; }
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0L10,5L0,10z" fill="#9a9a9a"/></marker></defs>
  <text class="rtg" x="20" y="24">LOCAL ROUND TRIP — NO TAPE, NO DAEMON</text>
  <rect class="gs" x="20" y="34" width="100" height="44"/>
  <text class="rt" x="70" y="53" text-anchor="middle">src/</text>
  <text class="rtd" x="70" y="68" text-anchor="middle">your files</text>
  <line class="rl" x1="120" y1="56" x2="208" y2="56" marker-end="url(#ah)"/>
  <text class="rtd" x="164" y="48" text-anchor="middle">rem archive build</text>
  <rect class="rs" x="210" y="34" width="150" height="44"/>
  <text class="rt" x="285" y="53" text-anchor="middle">demo.rao</text>
  <text class="rtd" x="285" y="68" text-anchor="middle">rao-v1 object</text>
  <line class="rl" x1="360" y1="56" x2="456" y2="56" marker-end="url(#ah)"/>
  <text class="rtd" x="408" y="48" text-anchor="middle">rem archive extract</text>
  <rect class="gs" x="458" y="34" width="110" height="44"/>
  <text class="rt" x="513" y="53" text-anchor="middle">restored/</text>
  <text class="rtd" x="513" y="68" text-anchor="middle">extracted copy</text>
  <line class="rl" x1="285" y1="78" x2="285" y2="92" marker-end="url(#ah)"/>
  <text class="rtd" x="285" y="106" text-anchor="middle">rem archive inspect</text>
  <polyline class="rl" points="70,78 70,118 513,118 513,78"/>
  <text class="rtd" x="291" y="132" text-anchor="middle">diff -r src restored — byte-identical</text>
  <text class="rtd" x="20" y="152">demo.rao is a valid POSIX pax tar stream — bsdtar -tf lists your files plus _remanence/manifest.cbor</text>
  <text class="rtd" x="20" y="168">a tape written by Remanence holds exactly these bytes as its object body</text>
</svg>
